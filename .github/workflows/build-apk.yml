name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Create local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/mediship.keystore \
            -alias mediship \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mediship123 \
            -keypass mediship123 \
            -dname "CN=MediShip, OU=Mobile, O=MediShip, L=Karachi, S=Sindh, C=PK"

      - name: Download app icon
        run: |
          curl -sL https://mediship-pwa.vercel.app/icons/icon-192.png -o icon.png
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$density
            cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
          done

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon
        env:
          KEYSTORE_PASS: mediship123
          KEY_PASS: mediship123

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediship-pwa-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: MediShip Android APK
          body: |
            MediShip Android app — opens MediShip PWA in a full-screen WebView.

            **Install instructions:**
            1. On your Android phone, go to Settings → Security → enable "Install from unknown sources"
            2. Download `app-release.apk` below
            3. Open the downloaded file and tap Install
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
